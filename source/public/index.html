<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Web Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <button id="menuButton" class="menu-button" aria-label="Open chapters menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <aside id="menu" class="menu" aria-hidden="true">
      <div class="menu-header">
        <h2>Chapters</h2>
      </div>
      <nav>
        <ul id="chaptersList" class="chapters-list"></ul>
      </nav>
    </aside>

    <div id="backdrop" class="backdrop" hidden></div>

    <main id="reader" class="reader" aria-live="polite">
      <section class="chapter loading">
        <h1>Loading chapters...</h1>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
